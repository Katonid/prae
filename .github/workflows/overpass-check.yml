name: Check Overpass mirror health

on:
  workflow_dispatch:
    inputs:
      endpoints:
        description: 'Space-separated Overpass endpoint URLs to probe'
        required: false
        default: 'https://overpass-api.de/api/interpreter https://lz4.overpass-api.de/api/interpreter https://z.overpass-api.de/api/interpreter https://overpass.openstreetmap.fr/api/interpreter https://maps.mail.ru/osm/tools/overpass/api/interpreter'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe public Overpass instances
        run: |
          Q='[out:json][timeout:20];node["amenity"="cafe"](around:2000,51.514,7.466);out 3;'
          for ep in ${{ github.event.inputs.endpoints }}; do
            echo "=== $ep"
            code=$(curl -s -m 30 -D /tmp/h -o /tmp/body -X POST "$ep" \
              --data-urlencode "data=$Q" \
              -H "Origin: https://katonid.github.io" \
              -w "%{http_code} time=%{time_total}s" || echo "CURL_FAILED")
            echo "STATUS: $code"
            grep -i "access-control-allow-origin" /tmp/h || echo "NO_CORS_HEADER"
            echo "NODES: $(grep -c '"type": "node"' /tmp/body || true)"
            echo "BODY_START: $(head -c 120 /tmp/body | tr '\n' ' ')"
            echo
          done
